<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create account — SakayPo</title>
  <link rel="icon" href="../image/carlogo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <a href="../index.html" class="auth-logo">SakayPo</a>

    <h1 class="auth-title">Create your account</h1>
    <p class="auth-sub">Join the carpool community. Your account will be reviewed before activation.</p>

    <div class="alert alert-error" id="error-msg"></div>
    <div class="alert alert-success" id="success-msg"></div>

    <form id="register-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First name</label>
          <input type="text" class="form-input" id="firstname" placeholder="Juan" required>
        </div>
        <div class="form-group">
          <label class="form-label">Last name</label>
          <input type="text" class="form-input" id="lastname" placeholder="dela Cruz" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" class="form-input" id="email" placeholder="juan@email.com" required>
      </div>

      <div class="form-group">
        <label class="form-label">Phone number</label>
        <input type="tel" class="form-input" id="phone" placeholder="09XX XXX XXXX" required>
      </div>

      <div class="form-group">
        <label class="form-label">I want to join as</label>
        <select class="form-select" id="role" required>
          <option value="">Select your role</option>
          <option value="passenger">Passenger</option>
          <option value="driver">Driver</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="password" placeholder="At least 8 characters" required minlength="8">
      </div>

      <div class="form-group">
        <label class="form-label">Confirm password</label>
        <input type="password" class="form-input" id="confirm-password" placeholder="Repeat your password" required>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">Create account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script>
    const form = document.getElementById('register-form');
    const submitBtn = document.getElementById('submit-btn');
    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
      successMsg.classList.remove('show');
    }
    function showSuccess(msg) {
      successMsg.textContent = msg;
      successMsg.classList.add('show');
      errorMsg.classList.remove('show');
    }
    function setLoading(loading) {
      submitBtn.disabled = loading;
      submitBtn.innerHTML = loading
        ? '<span class="spinner"></span>Creating account...'
        : 'Create account';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.remove('show');
      successMsg.classList.remove('show');

      const firstname = document.getElementById('firstname').value.trim();
      const lastname = document.getElementById('lastname').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const role = document.getElementById('role').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (password !== confirmPassword) {
        showError('Passwords do not match.');
        return;
      }
      if (!role) {
        showError('Please select a role.');
        return;
      }

      setLoading(true);

      try {
        // 1. Sign up with Supabase Auth
        const { data, error } = await db.auth.signUp({
          email,
          password,
          options: {
            data: {
              first_name: firstname,
              last_name: lastname,
              phone,
              role
            }
          }
        });

        if (error) throw error;

        // 2. Insert profile row (status: pending by default via DB trigger)
        // The DB trigger handles this automatically on auth.users insert
        // But we also do it manually as fallback:
        if (data.user) {
          await db.from('profiles').upsert({
            id: data.user.id,
            first_name: firstname,
            last_name: lastname,
            email,
            phone,
            role,
            status: 'pending'
          });
        }

        showSuccess('Account created! Check your email to confirm, then wait for admin approval.');
        form.reset();
        setTimeout(() => {
          window.location.href = 'pending.html';
        }, 2500);

      } catch (err) {
        showError(err.message || 'Something went wrong. Please try again.');
      } finally {
        setLoading(false);
      }
    });
  </script>

</body>
</html>
