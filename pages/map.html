<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Map — SakayPo</title>
  <link rel="icon" href="../image/carlogo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; }

    #map { position: fixed; inset: 0; background: #1a2035; z-index: 0; }
    .leaflet-tile { filter: brightness(0.7) invert(1) hue-rotate(185deg) saturate(0.6); }

    /* ── Topbar ── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1.25rem;
      background: rgba(15,13,11,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .topbar-logo { font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:white;text-decoration:none; }
    .topbar-right { display:flex;align-items:center;gap:0.75rem; }
    .topbar-user { font-size:0.75rem;color:rgba(255,255,255,0.5); }
    .topbar-signout { font-size:0.75rem;color:rgba(255,255,255,0.4);text-decoration:none; }

    /* ── Bottom Sheet ── */
    .bottom-sheet {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 900;
      background: rgba(20,18,16,0.97);
      border-top: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px 20px 0 0;
      transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
      max-height: 85vh;
      display: flex; flex-direction: column;
    }
    .bottom-sheet.collapsed { transform: translateY(calc(100% - 72px)); }
    .bottom-sheet.expanded  { transform: translateY(0); }

    /* Drag handle */
    .sheet-handle {
      display: flex; align-items: center; justify-content: center;
      padding: 10px 0 6px; cursor: pointer; flex-shrink: 0;
    }
    .sheet-handle-bar {
      width: 36px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px;
    }

    /* Collapsed peek row */
    .sheet-peek {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.25rem 0.85rem; flex-shrink: 0; cursor: pointer;
    }
    .peek-status { display:flex;align-items:center;gap:8px; }
    .peek-label { font-size:0.9rem;font-weight:500;color:white; }
    .peek-sub { font-size:0.75rem;color:rgba(255,255,255,0.45); }
    .peek-route { font-size:0.7rem;color:rgba(132,204,255,0.9); margin-top: 2px; }
    .peek-toggle {
      font-size:0.75rem;color:rgba(255,255,255,0.5);
      background:rgba(255,255,255,0.08);border:none;
      border-radius:50px;padding:5px 12px;cursor:pointer;
      font-family:'DM Sans',sans-serif;
    }

    /* Sheet body (scrollable) */
    .sheet-body {
      flex: 1; overflow-y: auto; padding: 0 1.25rem 1.5rem;
      display: flex; flex-direction: column; gap: 0.85rem;
    }
    .sheet-body::-webkit-scrollbar { display: none; }

    /* ── Desktop side panel (768px+) ── */
    @media (min-width: 768px) {
      .bottom-sheet {
        top: 60px; bottom: 1rem; right: 1rem; left: auto;
        width: 300px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08);
        max-height: none; transform: none !important;
      }
      .sheet-handle, .sheet-peek .peek-toggle { display: none; }
      .sheet-peek { cursor: default; }
      .sheet-body { padding-bottom: 1.25rem; }
      .bottom-sheet.collapsed { transform: none !important; }
    }

    /* ── Component styles ── */
    .online-dot  { width:10px;height:10px;border-radius:50%;background:#22C55E;box-shadow:0 0 0 3px rgba(34,197,94,0.2);flex-shrink:0; }
    .offline-dot { width:10px;height:10px;border-radius:50%;background:#6B6560;flex-shrink:0; }

    .driver-status-card {
      display:flex;align-items:center;gap:10px;padding:0.75rem 1rem;
      background:rgba(255,255,255,0.04);border-radius:10px;border:1px solid rgba(255,255,255,0.06);
    }
    .ds-name   { font-size:0.875rem;font-weight:500;color:white; }
    .ds-detail { font-size:0.75rem;color:rgba(255,255,255,0.4);margin-top:1px; }

    .request-card { padding:0.85rem 1rem;background:rgba(249,115,22,0.08);border:1px solid rgba(249,115,22,0.2);border-radius:10px; }
    .request-card h4 { font-size:0.85rem;font-weight:600;color:#F97316;margin-bottom:4px; }
    .request-card p  { font-size:0.8rem;color:rgba(255,255,255,0.5);line-height:1.5; }

    .pickup-form { display:flex;flex-direction:column;gap:0.6rem; }
    .pickup-input {
      width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
      border-radius:10px;padding:0.7rem 1rem;font-family:'DM Sans',sans-serif;
      font-size:0.9rem;color:white;outline:none;
    }
    .pickup-input::placeholder { color:rgba(255,255,255,0.25); }
    .pickup-input:focus { border-color:#F97316; }

    .btn-pickup {
      width:100%;background:#F97316;color:white;border:none;border-radius:50px;
      padding:0.8rem;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:500;
      cursor:pointer;transition:background 0.2s;
    }
    .btn-pickup:hover  { background:#EA6B0E; }
    .btn-pickup:disabled { opacity:0.5;cursor:not-allowed; }

    .btn-location {
      width:100%;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.7);
      border:1px solid rgba(255,255,255,0.12);border-radius:50px;padding:0.7rem;
      font-family:'DM Sans',sans-serif;font-size:0.875rem;cursor:pointer;transition:all 0.2s;
    }
    .btn-location:hover { border-color:rgba(255,255,255,0.3);color:white; }

    .btn-cancel { font-size:0.8rem;color:rgba(255,69,69,0.7);background:none;border:none;cursor:pointer;padding:0;font-family:'DM Sans',sans-serif; }
    .btn-cancel:hover { color:#F87171; }

    .section-label { font-size:0.68rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.3); }

    .status-tag { display:inline-block;font-size:0.7rem;font-weight:600;padding:2px 8px;border-radius:50px; }
    .tag-waiting  { background:rgba(249,115,22,0.15);color:#F97316; }
    .tag-accepted { background:rgba(34,197,94,0.12);color:#4ADE80; }

    .waiting-list { display:flex;flex-direction:column;gap:0.5rem; }
    .waiting-item {
      display:flex;align-items:center;gap:8px;padding:0.75rem 1rem;
      background:rgba(255,255,255,0.04);border-radius:10px;border:1px solid rgba(255,255,255,0.06);
    }
    .item-info { flex:1; }
    .item-name   { font-size:0.875rem;font-weight:500;color:white; }
    .item-note   { font-size:0.75rem;color:rgba(255,255,255,0.4);margin-top:2px; }
    .item-actions { display:flex;flex-direction:column;gap:4px;align-items:flex-end; }

    .btn-locate {
      font-size:0.72rem;background:rgba(59,130,246,0.15);color:#93C5FD;
      border:1px solid rgba(59,130,246,0.25);border-radius:6px;padding:3px 10px;
      cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;
    }
    .btn-locate:hover { background:rgba(59,130,246,0.28); }

    .action-btn { font-size:0.78rem;font-weight:500;padding:4px 12px;border-radius:50px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;white-space:nowrap; }
    .action-approve { background:rgba(34,197,94,0.15);color:#4ADE80; }
    .action-approve:hover { background:rgba(34,197,94,0.25); }

    .toggle-row { display:flex;align-items:center;justify-content:space-between; }
    .toggle-label { font-size:0.875rem;color:rgba(255,255,255,0.8); }
    .toggle-switch { width:44px;height:24px;background:rgba(255,255,255,0.15);border-radius:12px;position:relative;cursor:pointer;transition:background 0.2s;flex-shrink:0; }
    .toggle-switch.on { background:#22C55E; }
    .toggle-switch::after { content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:white;transition:transform 0.2s; }
    .toggle-switch.on::after { transform:translateX(20px); }

    .divider-text { text-align:center;font-size:0.75rem;color:rgba(255,255,255,0.25); }
  </style>
</head>
<body>

  <!-- Topbar -->
  <div class="topbar">
    <a href="../index.html" class="topbar-logo">SakayPo<span style="color:#F97316">.</span></a>
    <div class="topbar-right">
      <span class="topbar-user" id="user-greeting">Loading...</span>
      <a href="#" onclick="signOut()" class="topbar-signout">Sign out</a>
    </div>
  </div>

  <!-- Map -->
  <div id="map"></div>

  <!-- Bottom Sheet -->
  <div class="bottom-sheet collapsed" id="bottom-sheet">

    <!-- Drag handle (mobile only) -->
    <div class="sheet-handle" onclick="toggleSheet()">
      <div class="sheet-handle-bar"></div>
    </div>

    <!-- Peek row — always visible on mobile -->
    <div class="sheet-peek" onclick="toggleSheet()">
      <div class="peek-status">
        <div class="offline-dot" id="peek-dot"></div>
        <div>
          <div class="peek-label" id="peek-label">Loading...</div>
          <div class="peek-sub" id="peek-sub"></div>
          <div class="peek-route" id="peek-route"></div>
        </div>
      </div>
      <button class="peek-toggle" id="peek-btn">▲ Open</button>
    </div>

    <!-- Scrollable content -->
    <div class="sheet-body" id="panel-content"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script>
    let map, driverMarker, myPickupMarker;
    let currentUser, currentProfile;
    let currentDriverLocation = null;
    let driverOnline = false;
    let myRequest = null;
    let locationWatcher = null;
    let pendingPickup = null;
    let passengerMarkers = {};
    let routeLayer = null;
    let sheetOpen = false;

    const TILE_URL = 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
    const DEFAULT_LAT = 14.676, DEFAULT_LNG = 121.043;

    // ── Icons ──
    const driverIcon = L.divIcon({
      html:`<div style="background:#F97316;width:40px;height:40px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid white;box-shadow:0 3px 12px rgba(0,0,0,0.5)"></div>`,
      iconSize:[40,40], iconAnchor:[20,40], className:''
    });
    const waitingIcon = L.divIcon({
      html:`<div style="background:#3B82F6;width:36px;height:36px;border-radius:50%;border:3px solid white;box-shadow:0 2px 10px rgba(59,130,246,0.6);display:flex;align-items:center;justify-content:center;font-size:18px">🧍</div>`,
      iconSize:[36,36], iconAnchor:[18,18], className:''
    });
    const acceptedIcon = L.divIcon({
      html:`<div style="background:#22C55E;width:36px;height:36px;border-radius:50%;border:3px solid white;box-shadow:0 2px 10px rgba(34,197,94,0.6);display:flex;align-items:center;justify-content:center;font-size:18px">✅</div>`,
      iconSize:[36,36], iconAnchor:[18,18], className:''
    });
    const myPinIcon = L.divIcon({
      html:`<div style="background:#3B82F6;width:28px;height:28px;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.4)"></div>`,
      iconSize:[28,28], iconAnchor:[14,28], className:''
    });

    // ── Sheet toggle ──
    function toggleSheet() {
      sheetOpen = !sheetOpen;
      const sheet = document.getElementById('bottom-sheet');
      const btn   = document.getElementById('peek-btn');
      sheet.classList.toggle('collapsed', !sheetOpen);
      sheet.classList.toggle('expanded',   sheetOpen);
      btn.textContent = sheetOpen ? '▼ Close' : '▲ Open';
    }

    function openSheet()  { if (!sheetOpen) toggleSheet(); }
    function closeSheet() { if (sheetOpen)  toggleSheet(); }

    // ── Update peek bar ──
    function updatePeek(label, sub, dotClass) {
      document.getElementById('peek-label').textContent = label;
      document.getElementById('peek-sub').textContent   = sub;
      const dot = document.getElementById('peek-dot');
      dot.className = dotClass;
    }

    function clearRoute() {
      if (routeLayer) {
        map.removeLayer(routeLayer);
        routeLayer = null;
      }
    }

    async function drawRoute(from, to) {
      if (!from || !to) { clearRoute(); return; }
      const url = `https://router.project-osrm.org/route/v1/driving/${from.lng},${from.lat};${to.lng},${to.lat}?overview=full&geometries=geojson`;
      try {
        const res = await fetch(url);
        const data = await res.json();
        if (data.code !== 'Ok' || !data.routes?.length) {
          clearRoute();
          return;
        }
        const r = data.routes[0];
        const coords = r.geometry.coordinates.map(pt => [pt[1], pt[0]]);
        if (routeLayer) map.removeLayer(routeLayer);
        routeLayer = L.polyline(coords, { color: '#22C55E', weight: 4, opacity: 0.85 }).addTo(map);
        const km = (r.distance / 1000).toFixed(2);
        const min = Math.round(r.duration / 60);
        return `Route ${km} km · ETA ${min} min`;
      } catch (e) {
        console.warn('Route fetch failed', e);
        clearRoute();
        return;
      }
    }

    async function updateRoute() {
      document.getElementById('peek-route').textContent = '';
      if (!currentDriverLocation) { clearRoute(); return; }

      if (currentProfile.role === 'passenger' && myRequest && myRequest.pickup_lat && myRequest.pickup_lng && ['waiting', 'accepted'].includes(myRequest.status)) {
        const summary = await drawRoute(currentDriverLocation, {lat: myRequest.pickup_lat, lng: myRequest.pickup_lng});
        if (summary) document.getElementById('peek-route').textContent = summary;
        return;
      }

      if (currentProfile.role === 'driver') {
        const { data: requests } = await db.from('ride_requests').select('*').in('status', ['accepted', 'waiting']).order('created_at', { ascending: true });
        const target = (requests || []).find(r => r.status === 'accepted') || (requests || [])[0];
        if (target && target.pickup_lat && target.pickup_lng) {
          const summary = await drawRoute(currentDriverLocation, {lat: target.pickup_lat, lng: target.pickup_lng});
          if (summary) document.getElementById('peek-route').textContent = summary;
          return;
        }
      }

      clearRoute();
    }

    async function init() {
      const result = await requireApproved();
      if (!result) return;
      currentUser   = result.user;
      currentProfile = result.profile;

      document.getElementById('user-greeting').textContent =
        `${currentProfile.first_name} · ${currentProfile.role}`;

      map = L.map('map', { zoomControl: false }).setView([DEFAULT_LAT, DEFAULT_LNG], 14);
      L.tileLayer(TILE_URL, { attribution:'© OpenStreetMap', maxZoom:19 }).addTo(map);
      L.control.zoom({ position:'bottomleft' }).addTo(map);

      await loadDriverSession();
      await loadMyRequest();
      await updateRoute();

      // Realtime
      db.channel('driver-loc')
        .on('postgres_changes', { event:'*', schema:'public', table:'driver_sessions' }, async () => {
          await loadDriverSession();
          updatePeekFromState();
        })
        .subscribe();

      db.channel('ride-requests')
        .on('postgres_changes', { event:'*', schema:'public', table:'ride_requests' }, async () => {
          if (currentProfile.role === 'passenger') {
            await loadMyRequest();
            renderPassengerContent();
          } else {
            await refreshPassengerMarkers();
            renderDriverContent();
          }
        })
        .subscribe();

      if (currentProfile.role === 'driver') {
        await refreshPassengerMarkers();
        renderDriverContent();
      } else {
        renderPassengerContent();
      }
      await updateRoute();
    }

    function updatePeekFromState() {
      if (currentProfile?.role === 'driver') {
        if (driverOnline) updatePeek('You are online', 'Broadcasting location', 'online-dot');
        else              updatePeek('You are offline', 'Tap to go online', 'offline-dot');
      } else {
        if (myRequest?.status === 'accepted') updatePeek('Driver accepted!', 'On the way to you', 'online-dot');
        else if (myRequest)                   updatePeek('Waiting for driver', 'Request sent', 'offline-dot');
        else if (driverOnline)                updatePeek('Driver is online', 'Drop a pin to request', 'online-dot');
        else                                  updatePeek('Driver is offline', 'No driver available', 'offline-dot');
      }
    }

    // ── Load driver GPS ──
    async function loadDriverSession() {
      const { data } = await db.from('driver_sessions').select('*').eq('is_online', true).limit(1);
      if (data && data.length > 0) {
        driverOnline = true;
        const s = data[0];
        currentDriverLocation = { lat: s.latitude, lng: s.longitude };
        if (s.latitude && s.longitude) {
          if (driverMarker) driverMarker.setLatLng([s.latitude, s.longitude]);
          else driverMarker = L.marker([s.latitude, s.longitude], { icon: driverIcon })
            .addTo(map).bindPopup('<b>🚗 Your driver</b><br>Online now');
        }
      } else {
        driverOnline = false;
        currentDriverLocation = null;
        if (driverMarker) { map.removeLayer(driverMarker); driverMarker = null; }
      }
      updatePeekFromState();
      await updateRoute();
    }

    async function loadMyRequest() {
      if (currentProfile.role !== 'passenger') return;
      const { data } = await db.from('ride_requests').select('*')
        .eq('passenger_id', currentUser.id).in('status', ['waiting','accepted']).limit(1);
      myRequest = data && data.length ? data[0] : null;
      updatePeekFromState();
    }

    async function refreshPassengerMarkers() {
      const { data: requests } = await db.from('ride_requests').select('*')
        .in('status', ['waiting','accepted']).order('created_at', { ascending: true });

      const activeIds = new Set((requests || []).map(r => r.id));

      for (const id in passengerMarkers) {
        if (!activeIds.has(id)) { map.removeLayer(passengerMarkers[id]); delete passengerMarkers[id]; }
      }

      (requests || []).forEach(r => {
        if (!r.pickup_lat || !r.pickup_lng) return;
        const icon = r.status === 'accepted' ? acceptedIcon : waitingIcon;
        const popup = `<div style="font-family:'DM Sans',sans-serif;min-width:150px">
          <div style="font-weight:600;font-size:13px;margin-bottom:3px">🧍 ${r.passenger_name}</div>
          ${r.note ? `<div style="font-size:12px;color:#888;margin-bottom:3px">📝 ${r.note}</div>` : ''}
          <div style="font-size:11px;font-weight:600;color:${r.status==='accepted'?'#22C55E':'#F97316'};text-transform:uppercase">${r.status}</div>
        </div>`;

        if (passengerMarkers[r.id]) {
          passengerMarkers[r.id].setIcon(icon);
          passengerMarkers[r.id].setLatLng([r.pickup_lat, r.pickup_lng]);
        } else {
          passengerMarkers[r.id] = L.marker([r.pickup_lat, r.pickup_lng], { icon })
            .addTo(map).bindPopup(popup);
        }
      });
    }

    /* ── Passenger content ── */
    async function renderPassengerContent() {
      const content = document.getElementById('panel-content');
      updatePeekFromState();

      if (myRequest) {
        const accepted = myRequest.status === 'accepted';
        content.innerHTML = `
          <div class="section-label">Driver status</div>
          <div class="driver-status-card">
            <div class="${driverOnline ? 'online-dot' : 'offline-dot'}"></div>
            <div><div class="ds-name">Driver</div><div class="ds-detail">${driverOnline ? 'Online · tracking your ride' : 'Currently offline'}</div></div>
          </div>
          <div class="section-label">Your request</div>
          <div class="request-card">
            <h4>Status: <span class="status-tag ${accepted ? 'tag-accepted':'tag-waiting'}">${myRequest.status}</span></h4>
            <p>${accepted ? '🎉 Driver accepted! On the way.' : '⏳ Waiting for driver to accept...'}</p>
          </div>
          <button class="btn-cancel" onclick="cancelRequest()">✕ Cancel my request</button>`;

        if (myRequest.pickup_lat) {
          if (!myPickupMarker) {
            myPickupMarker = L.marker([myRequest.pickup_lat, myRequest.pickup_lng], { icon: myPinIcon })
              .addTo(map).bindPopup('📍 Your pickup location').openPopup();
          }
          map.setView([myRequest.pickup_lat, myRequest.pickup_lng], 16);
        }
        openSheet();
        await updateRoute();
        return;
      }

      if (myPickupMarker) { map.removeLayer(myPickupMarker); myPickupMarker = null; }

      content.innerHTML = `
        <div class="section-label">Driver status</div>
        <div class="driver-status-card">
          <div class="${driverOnline ? 'online-dot' : 'offline-dot'}"></div>
          <div><div class="ds-name">Driver</div><div class="ds-detail">${driverOnline ? 'Online · ready for passengers' : 'Currently offline'}</div></div>
        </div>
        <div class="section-label">Request a pickup</div>
        <div class="pickup-form">
          <button class="btn-location" onclick="useMyLocation()">📍 Use my current location</button>
          <div class="divider-text">— or tap the map to drop your pin —</div>
          <input type="text" class="pickup-input" id="pickup-note" placeholder="Add a note e.g. 'near sari-sari store'" maxlength="80">
          <button class="btn-pickup" id="request-btn" onclick="submitRequest()">Request pickup</button>
        </div>`;

      map.on('click', onMapClick);
    }

    function onMapClick(e) {
      if (currentProfile.role !== 'passenger' || myRequest) return;
      placePickupPin(e.latlng.lat, e.latlng.lng);
      openSheet();
    }

    function placePickupPin(lat, lng) {
      pendingPickup = { lat, lng };
      if (myPickupMarker) map.removeLayer(myPickupMarker);
      myPickupMarker = L.marker([lat, lng], { icon: myPinIcon })
        .addTo(map).bindPopup('📍 Your pickup location').openPopup();
    }

    function useMyLocation() {
      if (!navigator.geolocation) { alert('Geolocation not supported.'); return; }
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          placePickupPin(pos.coords.latitude, pos.coords.longitude);
          map.setView([pos.coords.latitude, pos.coords.longitude], 17);
          openSheet();
        },
        () => alert('Unable to get your location. Please allow location access.')
      );
    }

    async function submitRequest() {
      if (!pendingPickup) { alert('Please tap the map or use your location first.'); return; }
      const btn = document.getElementById('request-btn');
      btn.disabled = true; btn.textContent = 'Sending...';
      const note = document.getElementById('pickup-note')?.value || '';
      const { error } = await db.from('ride_requests').insert({
        passenger_id: currentUser.id,
        passenger_name: `${currentProfile.first_name} ${currentProfile.last_name}`,
        pickup_lat: pendingPickup.lat, pickup_lng: pendingPickup.lng,
        note, status: 'waiting'
      });
      if (error) { alert('Error: ' + error.message); btn.disabled = false; btn.textContent = 'Request pickup'; return; }
      map.off('click', onMapClick);
      await loadMyRequest();
      renderPassengerContent();
    }

    async function cancelRequest() {
      if (!myRequest) return;
      await db.from('ride_requests').update({ status: 'cancelled' }).eq('id', myRequest.id);
      if (myPickupMarker) { map.removeLayer(myPickupMarker); myPickupMarker = null; }
      myRequest = null; pendingPickup = null;
      map.on('click', onMapClick);
      renderPassengerContent();
    }

    /* ── Driver content ── */
    async function renderDriverContent() {
      const content = document.getElementById('panel-content');
      updatePeekFromState();

      const { data: onlineData } = await db.from('driver_sessions').select('*')
        .eq('driver_id', currentUser.id).eq('is_online', true).limit(1);
      const isOnline = onlineData && onlineData.length > 0;

      const { data: requests } = await db.from('ride_requests').select('*')
        .in('status', ['waiting','accepted']).order('created_at', { ascending: true });
      const waiting  = (requests || []).filter(r => r.status === 'waiting');
      const accepted = (requests || []).filter(r => r.status === 'accepted');

      if (isOnline) updatePeek('You are online', `${waiting.length} waiting`, 'online-dot');
      else          updatePeek('You are offline', 'Toggle to go online', 'offline-dot');

      content.innerHTML = `
        <div class="toggle-row">
          <span class="toggle-label">Go online</span>
          <div class="toggle-switch ${isOnline ? 'on' : ''}" onclick="toggleDriverOnline()"></div>
        </div>
        <div class="driver-status-card">
          <div class="${isOnline ? 'online-dot' : 'offline-dot'}"></div>
          <div><div class="ds-name">${currentProfile.first_name} (You)</div>
          <div class="ds-detail">${isOnline ? 'Broadcasting live location' : 'Tap toggle to go online'}</div></div>
        </div>

        ${accepted.length > 0 ? `
          <div class="section-label">✅ Accepted (${accepted.length})</div>
          <div class="waiting-list">
            ${accepted.map(r => `
              <div class="waiting-item">
                <div class="item-info">
                  <div class="item-name">${r.passenger_name}</div>
                  ${r.note ? `<div class="item-note">📝 ${r.note}</div>` : ''}
                </div>
                <button class="btn-locate" onclick="flyToPassenger(${r.pickup_lat},${r.pickup_lng})">📍 Locate</button>
              </div>`).join('')}
          </div>` : ''}

        <div class="section-label">⏳ Waiting (${waiting.length})</div>
        ${waiting.length === 0
          ? `<div style="font-size:0.82rem;color:rgba(255,255,255,0.3);padding:0.25rem 0">No passengers waiting yet.</div>`
          : `<div class="waiting-list">
              ${waiting.map(r => `
                <div class="waiting-item">
                  <div class="item-info">
                    <div class="item-name">${r.passenger_name}</div>
                    ${r.note ? `<div class="item-note">📝 ${r.note}</div>` : ''}
                  </div>
                  <div class="item-actions">
                    <button class="btn-locate" onclick="flyToPassenger(${r.pickup_lat},${r.pickup_lng})">📍 Locate</button>
                    <button class="action-btn action-approve" onclick="acceptPassenger('${r.id}')">Accept</button>
                  </div>
                </div>`).join('')}
            </div>`}`;
    }

    function flyToPassenger(lat, lng) {
      closeSheet();
      setTimeout(() => {
        map.flyTo([lat, lng], 17, { animate: true, duration: 1 });
        for (const id in passengerMarkers) {
          const m = passengerMarkers[id], pos = m.getLatLng();
          if (Math.abs(pos.lat - lat) < 0.0001 && Math.abs(pos.lng - lng) < 0.0001) m.openPopup();
        }
      }, 300);
    }

    async function toggleDriverOnline() {
      const { data } = await db.from('driver_sessions').select('*')
        .eq('driver_id', currentUser.id).eq('is_online', true).limit(1);
      const isOnline = data && data.length > 0;

      if (isOnline) {
        await db.from('driver_sessions').update({ is_online: false }).eq('driver_id', currentUser.id);
        if (locationWatcher) { navigator.geolocation.clearWatch(locationWatcher); locationWatcher = null; }
        renderDriverContent();
      } else {
        if (!navigator.geolocation) { alert('Geolocation required to go online.'); return; }
        navigator.geolocation.getCurrentPosition(async (pos) => {
          await db.from('driver_sessions').upsert({
            driver_id: currentUser.id,
            latitude: pos.coords.latitude, longitude: pos.coords.longitude,
            is_online: true, updated_at: new Date().toISOString()
          }, { onConflict: 'driver_id' });

          map.setView([pos.coords.latitude, pos.coords.longitude], 15);

          locationWatcher = navigator.geolocation.watchPosition(async (p) => {
            await db.from('driver_sessions').update({
              latitude: p.coords.latitude, longitude: p.coords.longitude,
              updated_at: new Date().toISOString()
            }).eq('driver_id', currentUser.id);
          }, null, { enableHighAccuracy: true, maximumAge: 3000 });

          renderDriverContent();
        }, () => alert('Could not get your location. Please allow GPS access.'));
      }
    }

    async function acceptPassenger(requestId) {
      await db.from('ride_requests').update({ status: 'accepted' }).eq('id', requestId);
      await refreshPassengerMarkers();
      renderDriverContent();
    }

    init();
  </script>

</body>
</html>
